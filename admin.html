<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenSmart 后台管理</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            margin: 0;
            background: #f4f6f8;
            color: #0f172a;
        }
        .wrap {
            max-width: 1040px;
            margin: 36px auto;
            padding: 0 16px;
        }
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            margin-bottom: 18px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 1.5rem;
        }
        .muted {
            color: #64748b;
            margin: 0 0 16px;
        }
        form {
            display: grid;
            gap: 10px;
            max-width: 420px;
        }
        input, button, select {
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }
        button {
            border: none;
            background: #16a34a;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            padding: 10px 8px;
            font-size: 14px;
            vertical-align: top;
        }
        .hidden {
            display: none;
        }
        .status-pill {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 8px;
            background: #e2e8f0;
            font-size: 12px;
            text-transform: uppercase;
        }
        .toolbar {
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .toolbar input, .toolbar select {
            min-width: 140px;
            flex: 1;
        }
        .btn-muted {
            background: #334155;
        }
        .btn-outline {
            background: #fff;
            border: 1px solid #16a34a;
            color: #166534;
        }
        .btn-compact {
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
        }
        .row-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .detail-box {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            background: #f8fafc;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }
        .kpi-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px;
            background: #f8fafc;
        }
        .kpi-label {
            font-size: 12px;
            color: #64748b;
        }
        .kpi-value {
            font-size: 20px;
            font-weight: 700;
            margin-top: 4px;
        }
        .quote-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 8px;
            max-height: 220px;
            overflow: auto;
        }
        .quote-list li {
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            font-size: 13px;
        }
        .timeline-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 8px;
            max-height: 260px;
            overflow: auto;
        }
        .timeline-list li {
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
            font-size: 13px;
        }
        textarea {
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            width: 100%;
            min-height: 90px;
            resize: vertical;
        }
        @media (max-width: 900px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
            .kpi-grid {
                grid-template-columns: repeat(2, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <section class="card" id="loginCard">
            <h1>GreenSmart 后台登录</h1>
            <p class="muted">默认管理员账号来自服务器 `.env` 配置。</p>
            <form id="loginForm">
                <input type="email" id="email" name="email" placeholder="请输入管理员邮箱" required>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
                <button type="submit" id="loginBtn">登录</button>
            </form>
            <p id="loginFeedback" class="muted"></p>
        </section>

        <section class="card hidden" id="dashboardCard">
            <h1>询盘管理看板</h1>
            <p class="muted">统一查看询盘筛选、跟进状态、负责人、报价与备注。</p>
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-label">询盘总数</div>
                    <div class="kpi-value" id="kpiTotal">0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">近7天新增</div>
                    <div class="kpi-value" id="kpi7d">0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">已报价</div>
                    <div class="kpi-value" id="kpiQuoted">0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">已成交</div>
                    <div class="kpi-value" id="kpiWon">0</div>
                </div>
            </div>
            <div class="toolbar">
                <select id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="new">新建</option>
                    <option value="contacted">已联系</option>
                    <option value="quoted">已报价</option>
                    <option value="won">已成交</option>
                    <option value="lost">已流失</option>
                </select>
                <input id="countryFilter" type="text" placeholder="按国家筛选（如：越南）">
                <input id="productFilter" type="text" placeholder="按产品筛选（如：竹纤维花盆）">
                <input id="keywordFilter" type="text" placeholder="搜索姓名/邮箱/需求内容">
                <button id="applyFilterBtn" type="button" class="btn-outline">应用筛选</button>
                <button id="clearFilterBtn" type="button" class="btn-outline">清空筛选</button>
            </div>
            <div class="toolbar">
                <button id="refreshBtn" type="button">刷新数据</button>
                <button id="exportCsvBtn" type="button" class="btn-outline">导出 CSV</button>
                <button id="logoutBtn" type="button" class="btn-muted">退出登录</button>
                <span class="muted" id="summaryText">0 条记录</span>
            </div>
            <div class="toolbar">
                <button id="prevPageBtn" type="button" class="btn-outline">上一页</button>
                <span class="muted" id="pageInfo">第 1 页 / 共 1 页</span>
                <button id="nextPageBtn" type="button" class="btn-outline">下一页</button>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>创建时间</th>
                            <th>状态</th>
                            <th>姓名</th>
                            <th>邮箱</th>
                            <th>国家</th>
                            <th>产品</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="inquiryRows"></tbody>
                </table>
            </div>
            <div id="detailsPanel" class="details-grid hidden" style="margin-top:16px;">
                <div class="detail-box">
                    <h3 style="margin-top:0;">询盘详情</h3>
                    <p class="muted" id="detailMeta">点击列表中的“详情”查看具体内容。</p>
                    <p id="detailMessage" style="white-space:pre-wrap;"></p>
                    <label for="detailStatusSelect">更新状态</label>
                    <select id="detailStatusSelect">
                        <option value="new">新建</option>
                        <option value="contacted">已联系</option>
                        <option value="quoted">已报价</option>
                        <option value="won">已成交</option>
                        <option value="lost">已流失</option>
                    </select>
                    <label for="detailAssigneeSelect" style="display:block;margin-top:12px;">分配负责人</label>
                    <select id="detailAssigneeSelect">
                        <option value="">未分配</option>
                    </select>
                    <button id="saveStatusBtn" type="button" class="btn-compact" style="margin-top:10px;">保存状态/负责人</button>
                    <label for="detailNoteInput" style="display:block;margin-top:12px;">新增跟进备注</label>
                    <textarea id="detailNoteInput" placeholder="填写电话沟通结论、报价进展、下一步计划..."></textarea>
                    <button id="addNoteBtn" type="button" class="btn-compact" style="margin-top:10px;">添加备注</button>
                </div>
                <div class="detail-box">
                    <h3 style="margin-top:0;">报价记录</h3>
                    <div class="toolbar">
                        <input id="quotePriceInput" type="number" min="0" step="0.01" placeholder="单价">
                        <input id="quoteCurrencyInput" type="text" value="USD" maxlength="3" placeholder="币种">
                        <input id="quoteMoqInput" type="text" placeholder="MOQ（可选）">
                    </div>
                    <div class="toolbar">
                        <input id="quoteIncotermInput" type="text" placeholder="贸易条款（EXW/FOB/CIF）">
                        <input id="quoteValidityInput" type="number" min="1" max="180" value="30" placeholder="有效期（天）">
                        <button id="createQuoteBtn" type="button" class="btn-compact">创建报价</button>
                    </div>
                    <textarea id="quoteNoteInput" placeholder="报价说明（包装、交期、报价范围等）..."></textarea>
                    <ul id="quoteList" class="quote-list" style="margin-top:10px;"></ul>
                </div>
                <div class="detail-box">
                    <h3 style="margin-top:0;">跟进时间线</h3>
                    <ul id="timelineList" class="timeline-list"></ul>
                </div>
            </div>
            <div class="detail-box" style="margin-top:16px;">
                <h3 style="margin-top:0;">系统设置（仅管理员）</h3>
                <div class="toolbar">
                    <input id="notifyEmailInput" type="email" placeholder="通知邮箱">
                    <select id="defaultAssigneeInput">
                        <option value="">默认负责人（不设置）</option>
                    </select>
                    <button id="saveSettingsBtn" type="button" class="btn-compact">保存设置</button>
                </div>
            </div>
        </section>
    </div>
    <script src="src/scripts/admin.js"></script>
</body>
</html>
